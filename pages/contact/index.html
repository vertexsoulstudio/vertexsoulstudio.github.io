<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Thank You!</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
        <link rel="stylesheet" href="../../css/style.css" />
        <link rel="icon" type="image/png" href="../../resources/images/logos/vxs_icon.png" />
        <style>
            .redirect-wrap {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 40px 6%;
            }
            .redirect-wrap img {
                width: 220px;
                max-width: 70vw;
                height: auto;
            }
            .redirect-wrap p {
                font-family: var(--font-display);
                font-size: 16px;
                letter-spacing: 0.08em;
                color: var(--text-2);
                max-width: 480px;
            }
        </style>
    </head>
    <body>
        <div class="redirect-wrap">
            <img src="../../resources/images/logos/vxs_logo.png" alt="VertexSoulStudioLogo"><br>
            <p>Thanks for reaching out!</p>
            <p>We will be in contact shortly!</p>
            <p class="redirect-count">Redirecting in... <span id="countdown">3</span></p>
        </div>

        <script>
            (function () {
                const target = "https://vertexsoulstudio.github.io/";
                const el = document.getElementById('countdown');
                let count = 3;
                const timer = setInterval(() => {
                    count--;
                    if (count > 0) {
                        el.textContent = count;
                    } else {
                        clearInterval(timer);
                        window.location.href = target;
                    }
                }, 1000);
            })();
        </script>
    </body>
</html>
