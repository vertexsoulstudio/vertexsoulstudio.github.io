<!DOCTYPE html>
<html lang="">
<head>
  <meta charset="utf-8">
  <title>
    Vertex Soul Studio
  </title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tektur:wght@400..900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Bruno+Ace+SC&family=Tektur:wght@400..900&display=swap');

    :root {
      --acc-rojo: #ff004c;
      --acc-azul: #00d0ff;
      --bg:       #000;
      --clear:    #ddd;
      --gris:     #202024;
      --text-dark:#000;
      --carr-div: 3;
      --strm-div: 6;
    }
    html {
      color:var(--clear);
      scroll-behavior: smooth;
      scroll-padding-top: 50px;
      overflow-x: hidden;
    }

    body{
      padding:0;
      margin:0;
    }

    h1{
      color: var(--clear);
      font-family: "Bruno Ace SC", sans-serif;
      font-weight: 400;
      font-style: normal;
      margin: 15px;
      font-size: 72px;
    }

    .header{
      margin: 0;
      position: sticky;
      top: 0;
      background-color: var(--gris);
    }

    .header_contenedor{
      color: var(--clear);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .links_contenedor{
      color: var(--clear);
      font-family: "Tektur", sans-serif;
      font-size: 20px;
      font-weight: 150;
      margin: 15px;
      width: 500px;
      display: flex;
      justify-content: space-between;
    }

    .links_contenedor a{
      color: var(--clear);
      text-decoration: none;
    }

    .link_header{
      margin: 15px;
    }

    .whoarewe_container{
      display: flex;
      justify-content: center;
    }
  </style>
</head>


<body style="background-color: var(--gris)">
  <header id="header" class="header">
    <div class="header_contenedor">
      <div class="alto_titulo">
        <h1>Vertex Soul Studio</h1>
      </div>
      <div class="links_contenedor">
        <a href="#header" class="link_header">
          About
        </a>
        <a href="#portfolio" class="link_header">
          Portfolio
        </a>
        <a href="#testimonials" class="link_header">
          Testimonials
        </a>
        <a href="#contact" class="link_header">
          Contact
        </a>
      </div>
    </div>

  </header>
  <main>
    <div class="whoarewe_container">
      <div>
        Who the fuck are we aaaaaaaaaaaaaaaaaaaaaaaaa?
      </div>
      <div>
        model
      </div>
    </div>
  </main>
  <footer style="height: 2000px;">
    La bida
  </footer>
</body>
</html>
